      url: "https://make.wordpress.org/ai/2025/07/17/abilities-api/"
      key_takeaway: "Explizite Schema-Registrierung, kryptografisch signierte Payloads für MCP-triggered calls"
    - title: "Elementor 4.0 — Atomic Foundation"
      url: "https://elementor.com/blog/editor-40-atomic-forms-pro-interactions/"
      key_takeaway: "Strikte Verwendung von Global Variables/Classes, Prop-Schema-Validation am Server"
    - title: "MCP Server Security 2026 (Obot.ai)"
      url: "https://obot.ai/resources/learning-center/mcp-security/"
      key_takeaway: "Defense-in-Depth, Gateway-Pattern für Auth, strikte Schema-Validation"
    - title: "State of WordPress Security 2026 (Patchstack)"
      url: "https://patchstack.com/whitepaper/state-of-wordpress-security-in-2026/"
      key_takeaway: "PHP-Sandbox als isolierter Sidecar, niedrig-privilegierter User, disabled functions"
    - title: "Node.js CLI Apps Best Practices"
      url: "https://github.com/lirantal/nodejs-cli-apps-best-practices"
      key_takeaway: "SQLite für persistent state (statt JSON-Files) bei lang laufenden CLIs"
  known_pitfalls:
    - "Schema-Drift zwischen Client-/Server-Repos → silent failures"
    - "Implizite Permission-Callbacks → Attack-Surface für AI-Agents"
    - "Unrestricted Sandbox-PHP → primärer RCE-Vektor in WP-Plugins"
    - "Fehlende SAST-Config in WP-Plugins → CVEs unentdeckt vor Release"
    - "Browser-basierte Visual-QA ohne axe-core → nur visuelles, kein A11y-Testing"
    - "Keine Memory/Latency-Profiler → Performance-Regressionen unentdeckt"

  # =========================================================================
  # SUPPLEMENTARY TOOLS (aus Web-Recherche 2026-06-10, ergänzt nach add-items)
  # =========================================================================
  supplementary_tools:
    security:
      - name: "PHPStan"
        url: "https://phpstan.org/"
        use: "Tiefe Type-Checks + Bug-Detection für V2-Plugin"
      - name: "Psalm"
        url: "https://psalm.dev/"
        use: "Taint-Analysis für XSS/SQLi (mit --taint-analysis)"
      - name: "Semgrep"
        url: "https://semgrep.org/"
        use: "Sprachagnostisch, perfekt für Node+PHP-Monorepos (semgrep-action GitHub-Action)"
      - name: "Patchstack CLI"
        url: "https://patchstack.com/"
        use: "WP-Vulnerability-Intelligence, scannt composer.lock + plugin-dir"
      - name: "WP-CLI (security commands)"
        url: "https://wp-cli.org/"
        use: "wp core verify-checksums, mass-updates in CI"
    performance:
      - name: "Clinic.js"
        url: "https://clinicjs.org/"
        use: "Node.js Doctor + Flame + Bubbleprof (Event-Loop, Memory, Flame-Graphs)"
      - name: "Blackfire.io"
        url: "https://blackfire.io/"
        use: "PHP-Execution-Path-Profiling + DB-Query-Visualization"
      - name: "Tideways"
        url: "https://tideways.com/"
        use: "APM + Slow-Query-Detection für WP-Production"
      - name: "Query Monitor"
        url: "https://querymonitor.com/"
        use: "WP-Plugin für Echtzeit-DB-Query-Visualization + Hook-Analyse"
      - name: "Node --inspect + Chrome DevTools"
        url: "https://nodejs.org/en/learn/getting-started/debugging"
        use: "Native Heap-Snapshots + CPU-Profile ohne extra Deps"
    a11y:
      - name: "axe-core (Deque)"
        url: "https://github.com/dequelabs/axe-core"
        use: "Industrie-Standard, low-false-positive, Playwright-Integration"
      - name: "Lighthouse CLI"
        url: "https://github.com/GoogleChrome/lighthouse"
        use: "Google-A11y-Audit + Performance + SEO in einem Run"
      - name: "Pa11y-CI"
        url: "https://github.com/pa11y/pa11y-ci"
        use: "Multi-URL-A11y-Test, JSON/HTML-Report für CI"
      - name: "eslint-plugin-jsx-a11y"
        url: "https://github.com/jsx-eslint/eslint-plugin-jsx-a11y"
        use: "Static-Analysis für React/JSX-A11y"
      - name: "Accessibility Checker (WP-Plugin)"
        url: "https://wordpress.org/plugins/accessibility-checker/"
        use: "Site-wide A11y-Monitoring im WP-Dashboard (für Content-Editoren)"
