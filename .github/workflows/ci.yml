name: Framer V4 Pipeline CI

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'wizard.js'
      - 'package.json'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'wizard.js'
      - 'package.json'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install framer-export dependencies
        run: PUPPETEER_SKIP_DOWNLOAD=1 npm install --prefix tools/framer-export
      - name: Run full test suite
        run: npm test

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install framer-export dependencies
        run: PUPPETEER_SKIP_DOWNLOAD=1 npm install --prefix tools/framer-export
      - name: Run integration tests
        run: node --test tests/integration.test.js

  lint:
    name: Lint (version check + JS syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check test-count lint
        run: npm run lint:version
      - name: Check all JS scripts syntax
        run: |
          for f in wizard.js scripts/*.js scripts/wizard/*.js scripts/preflight/*.js scripts/lib/*.js; do
            node --check "$f" || exit 1
          done
          echo "All syntax OK"

  test-all:
    name: Full Test Suite Gate
    runs-on: ubuntu-latest
    needs: [test, test-integration, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install framer-export dependencies
        run: PUPPETEER_SKIP_DOWNLOAD=1 npm install --prefix tools/framer-export
      - name: Run full test:all suite
        run: npm run test:all
